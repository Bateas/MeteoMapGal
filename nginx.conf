# ── Rate limiting zones ─────────────────────────────
# Behind Cloudflare Tunnel: $binary_remote_addr is the tunnel IP (same for all users).
# Use CF-Connecting-IP header for real per-user rate limiting.
# Fallback to $binary_remote_addr if header missing (direct access / dev).
map $http_cf_connecting_ip $rate_limit_key {
    ""      $binary_remote_addr;
    default $http_cf_connecting_ip;
}
limit_req_zone $rate_limit_key zone=api_limit:10m rate=50r/s;
limit_req_zone $rate_limit_key zone=webhook_limit:5m rate=1r/m;  # 1 req/min per user for webhooks (feedback/alerts)

# ── Proxy cache — reduces external API load ─────────
# AEMET rate-limits aggressively (~100 req/min). Cache responses so N users
# hitting the same endpoint share 1 upstream request per cache window.
# 50MB zone, keys by URI+args. Inactive entries purged after 10min.
proxy_cache_path /var/cache/nginx/aemet levels=1:2 keys_zone=aemet_cache:10m max_size=50m inactive=10m;
proxy_cache_path /var/cache/nginx/meteogalicia levels=1:2 keys_zone=mg_cache:10m max_size=50m inactive=10m;

# ── CORS origin whitelist ─────────────────────────
# Only allow requests from our own domains (not open relay).
map $http_origin $cors_origin {
    default "";
    "http://localhost:5173"               $http_origin;
    "https://meteomapgal.navia3d.com"     $http_origin;
}

server {
    listen 80;
    server_name _;

    root /var/www/meteomapgal;
    index index.html;

    # ── Security headers ────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://static.cloudflareinsights.com; script-src-elem 'self' 'unsafe-inline' https://static.cloudflareinsights.com; connect-src 'self' https: http: wss: ws:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https: http:; font-src 'self' data: https://fonts.gstatic.com; worker-src 'self' blob:; frame-src 'none'" always;

    # ── Block dotfiles (except .well-known for ACME/SSL) ──
    location ~ /\.(?!well-known) {
        return 444;
    }

    # ── Block CMS exploits, admin panels, scanner targets ──
    location ~* ^/(admin|wp-admin|wp-login|wp-content|wp-includes|wp-config|xmlrpc|phpmyadmin|server-status|server-info|cgi-bin|console|shell|install|setup|backup|dump|database|actuator|solr|manager|jmx-console) {
        return 444;
    }

    # ── Block dangerous file extensions ────────────────
    location ~* \.(sql|bak|old|orig|save|swp|log|ini|conf|sh|py|pl|rb|php|asp|aspx|jsp|cgi|env)$ {
        return 444;
    }

    # ── Gzip compression ─────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── Static assets — long cache (Vite hashes filenames) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── PWA assets ───────────────────────────────────
    location /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── AEMET API proxy (cached 5min — prevents rate limit with multiple users) ──
    location /aemet-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://opendata.aemet.es/opendata/;
        proxy_ssl_server_name on;
        proxy_set_header Host opendata.aemet.es;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;

        proxy_cache aemet_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 301 302 1m;
        proxy_cache_valid any 30s;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }

    location /aemet-data/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://opendata.aemet.es/;
        proxy_ssl_server_name on;
        proxy_set_header Host opendata.aemet.es;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;

        proxy_cache aemet_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_valid any 30s;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # ── MeteoGalicia API proxy (cached 3min) ─────────
    location /meteogalicia-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://servizos.meteogalicia.gal/;
        proxy_ssl_server_name on;
        proxy_set_header Host servizos.meteogalicia.gal;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;

        proxy_cache mg_cache;
        proxy_cache_valid 200 3m;
        proxy_cache_valid any 30s;
        proxy_cache_key "$request_uri";
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # MeteoSIX v5: reuses /meteogalicia-api/ via /meteogalicia-api/apiv5/ path (no separate route needed)

    # ── Meteoclimatic API proxy ──────────────────────
    location /meteoclimatic-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://www.meteoclimatic.net/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.meteoclimatic.net;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── Netatmo API proxy ────────────────────────────
    location /netatmo-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://app.netatmo.net/;
        proxy_ssl_server_name on;
        proxy_set_header Host app.netatmo.net;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    location /netatmo-auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass https://auth.netatmo.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host auth.netatmo.com;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── Lightning / meteo2api proxy ──────────────────
    location /meteo2api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://apis-ext.xunta.gal/meteo2api/;
        proxy_ssl_server_name on;
        proxy_set_header Host apis-ext.xunta.gal;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── IDEG / Xunta proxy ──────────────────────────
    location /ideg-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://ideg.xunta.gal/;
        proxy_ssl_server_name on;
        proxy_set_header Host ideg.xunta.gal;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── EUMETSAT satellite proxy ─────────────────
    location /eumetsat-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://view.eumetsat.int/;
        proxy_ssl_server_name on;
        proxy_set_header Host view.eumetsat.int;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── ENAIRE airspace proxy ──────────────────────
    location /enaire-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://servais.enaire.es/;
        proxy_ssl_server_name on;
        proxy_set_header Host servais.enaire.es;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── Puertos del Estado buoy data proxy ──────────
    location /portus-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://portus.puertos.es/portussvr/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host portus.puertos.es;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── Observatorio Costeiro da Xunta proxy ────────
    location /obscosteiro-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://apis-ext.xunta.gal/mgplatpubapi/v1/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host apis-ext.xunta.gal;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── SkyX personal weather station proxy ─────────
    location /skyx-api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass https://api.skyxglobal.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.skyxglobal.com;
        proxy_set_header X-Auth "a21bd737-a714-4a5c-9b08-e7d3d2693a51";
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── NOAA CPC — NAO/AO teleconnection indices ────────
    location /noaa-api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass https://ftp.cpc.ncep.noaa.gov/;
        proxy_ssl_server_name on;
        proxy_set_header Host ftp.cpc.ncep.noaa.gov;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
        proxy_cache_valid 200 6h;
    }

    # ── RADAR ON RAIA — HF Radar surface currents (INTECMAR) ────────
    location /hfradar-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://opendap.intecmar.gal/thredds/wms/HFRADAR_Galicia_Aggr_NRT_v2.2_Totals;
        proxy_ssl_server_name on;
        proxy_set_header Host opendap.intecmar.gal;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── IHM / Puertos del Estado tide proxy ────────
    location /ihm-api/ {
        limit_req zone=api_limit burst=80 nodelay;
        proxy_pass https://ideihm.covam.es/;
        proxy_ssl_server_name on;
        proxy_set_header Host ideihm.covam.es;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
    }

    # ── MeteoMapGal History API (local) ─────────────
    location /api/v1/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS handled by API server — hide nginx CORS
        proxy_hide_header Access-Control-Allow-Origin;
    }

    # ── GoAccess real-time analytics (WebSocket) ───
    location /goaccess {
        # Restrict to local network only
        allow 192.168.10.0/24;
        allow 127.0.0.1;
        deny all;

        proxy_pass http://127.0.0.1:7890;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── n8n webhook proxy ──────────────────────────
    # Rate limited: 1 req/min per user (feedback spam protection)
    location /api/webhook/ {
        limit_req zone=webhook_limit burst=3 nodelay;
        proxy_pass http://REDACTED_N8N_HOST:5678/webhook/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Widget: allow iframe embedding on external sites ──
    location = /widget.html {
        # Override server-level X-Frame-Options (SAMEORIGIN → removed for widget)
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://static.cloudflareinsights.com; script-src-elem 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https: wss:; font-src 'self' data: https://fonts.gstatic.com; worker-src 'self' blob:; frame-ancestors *" always;
        try_files $uri =404;
    }

    # ── OpenSky Network — Aviation aircraft tracking ──────────
    location /opensky-api/ {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass https://opensky-network.org/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host opensky-network.org;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
        proxy_cache_valid 200 15s;
    }

    # ── CESGA THREDDS — SWAN wave model WMS tiles ───
    location /swan-api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass https://thredds-meteo.cesga.es/;
        proxy_ssl_server_name on;
        proxy_set_header Host thredds-meteo.cesga.es;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "$cors_origin" always;
        proxy_cache mg_cache;
        proxy_cache_valid 200 30m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status always;
    }

    # ── SPA fallback ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
