server {
    listen 80;
    server_name _;

    root /var/www/meteomapgal;
    index index.html;

    # ── Security headers ────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;

    # ── Gzip compression ─────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml;

    # ── Static assets — long cache (Vite hashes filenames) ──
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── PWA assets ───────────────────────────────────
    location /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── AEMET API proxy ──────────────────────────────
    location /aemet-api/ {
        proxy_pass https://opendata.aemet.es/opendata/;
        proxy_ssl_server_name on;
        proxy_set_header Host opendata.aemet.es;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /aemet-data/ {
        proxy_pass https://opendata.aemet.es/;
        proxy_ssl_server_name on;
        proxy_set_header Host opendata.aemet.es;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── MeteoGalicia API proxy ───────────────────────
    location /meteogalicia-api/ {
        proxy_pass https://servizos.meteogalicia.gal/;
        proxy_ssl_server_name on;
        proxy_set_header Host servizos.meteogalicia.gal;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Meteoclimatic API proxy ──────────────────────
    location /meteoclimatic-api/ {
        proxy_pass https://www.meteoclimatic.net/;
        proxy_ssl_server_name on;
        proxy_set_header Host www.meteoclimatic.net;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Netatmo API proxy ────────────────────────────
    location /netatmo-api/ {
        proxy_pass https://app.netatmo.net/;
        proxy_ssl_server_name on;
        proxy_set_header Host app.netatmo.net;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    location /netatmo-auth/ {
        proxy_pass https://auth.netatmo.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host auth.netatmo.com;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── Lightning / meteo2api proxy ──────────────────
    location /meteo2api/ {
        proxy_pass https://apis-ext.xunta.gal/meteo2api/;
        proxy_ssl_server_name on;
        proxy_set_header Host apis-ext.xunta.gal;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── IDEG / Xunta proxy ──────────────────────────
    location /ideg-api/ {
        proxy_pass https://ideg.xunta.gal/;
        proxy_ssl_server_name on;
        proxy_set_header Host ideg.xunta.gal;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── EUMETSAT satellite proxy ─────────────────
    location /eumetsat-api/ {
        proxy_pass https://view.eumetsat.int/;
        proxy_ssl_server_name on;
        proxy_set_header Host view.eumetsat.int;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── ENAIRE airspace proxy ──────────────────────
    location /enaire-api/ {
        proxy_pass https://servais.enaire.es/;
        proxy_ssl_server_name on;
        proxy_set_header Host servais.enaire.es;
        proxy_set_header Origin "";
        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ── n8n webhook proxy ──────────────────────────
    # Uncomment and set your n8n IP when ready:
    # location /api/webhook/ {
    #     proxy_pass http://YOUR_N8N_IP:5678/webhook/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # ── SPA fallback ─────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
