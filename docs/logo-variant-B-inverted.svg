<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Variant B: Inverted — widest wind at top, shortest wave at bottom -->
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="wave-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Wind 1 (top, WIDEST) -->
  <path d="M6 14 Q24 6, 50 14 Q56 17, 54 11 Q51 6, 46 10" fill="none" stroke="url(#wg)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Wind 2 (middle) -->
  <path d="M11 26 Q27 20, 45 26 Q50 29, 48 23 Q46 18, 42 22" fill="none" stroke="url(#wg)" stroke-width="3.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Wind 3 (shorter) -->
  <path d="M16 38 Q29 33, 40 38 Q44 40, 42 35 Q41 31, 37 34" fill="none" stroke="url(#wg)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Wave (bottom, SHORTEST) -->
  <path d="M19 50 Q26 45, 32 50 Q38 55, 45 50" fill="none" stroke="url(#wave-g)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
</svg>
