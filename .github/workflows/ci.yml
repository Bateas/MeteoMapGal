name: CI

# Build + test on every push to master and on every PR.
# Uses Node 24 (matches local dev). LXC 305 prod can be bumped to Node 24
# in next deploy (Node 24 is current LTS; backwards compatible).

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  # Cancel in-progress runs when a new commit is pushed to the same branch/PR
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies (root)
        run: npm ci --no-audit --no-fund

      - name: Install dependencies (ingestor)
        # ingestor has its own package.json (pg, dotenv) — vitest picks
        # up ingestor/**/*.test.ts which imports from these modules.
        # Without this step, ingestor/icaFetcher.test.ts and others fail
        # with "Cannot find module pg" on a fresh CI runner.
        run: cd ingestor && npm ci --no-audit --no-fund

      - name: Run tests (Vitest)
        run: |
          npx vitest run --reporter=verbose 2>&1 | tee /tmp/test-output.log
          test_exit=${PIPESTATUS[0]}
          if [ $test_exit -ne 0 ]; then
            echo "::group::Failing tests"
            grep -E "(FAIL|×|✗|Error:)" /tmp/test-output.log | head -20 | while read line; do
              echo "::error::$line"
            done
            echo "::endgroup::"
          fi
          exit $test_exit
        env:
          CI: true

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitest-output
          path: /tmp/test-output.log
          retention-days: 7

      - name: Production build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Bundle size report
        run: |
          echo "### Bundle sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Chunk | Size | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----:|--------:|" >> $GITHUB_STEP_SUMMARY
          for f in dist/assets/main-*.js dist/assets/maplibre-*.js dist/assets/recharts-*.js; do
            if [ -f "$f" ]; then
              name=$(basename "$f" | sed 's/-[A-Za-z0-9_-]*\.js$//')
              size=$(stat -c%s "$f" | numfmt --to=iec)
              gz=$(gzip -c "$f" | wc -c | numfmt --to=iec)
              echo "| $name | $size | $gz |" >> $GITHUB_STEP_SUMMARY
            fi
          done
