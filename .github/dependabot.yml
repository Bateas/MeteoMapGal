# Dependabot — weekly dep updates, grouped to avoid PR noise.
# Target: catch security patches + major versions without daily PRs.
#
# SUPPLY-CHAIN DEFENSE: `cooldown` delays opening a PR until a release has
# been public for N days. Trojanized packages (compromised maintainer —
# Shai-Hulud sept-2025, tj-actions mar-2025) are detected and yanked from
# the registry within hours/days, so a poisoned version is gone before we
# ever see the PR. This is the PRIMARY defense; `.npmrc ignore-scripts` is
# the secondary one. Combined with: never `npm install` a fresh bump the
# same day. See CLAUDE.md "PROTOCOLO DEPENDENCIAS / SUPPLY-CHAIN".
version: 2
updates:
  # Frontend dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    # Hold majors that require migration work we haven't done yet
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # @eslint/js v10 requires eslint v10 (linked versions). Bumping
      # @eslint/js alone breaks the eslint flat config.
      - dependency-name: "@eslint/*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/*"
        update-types: ["version-update:semver-major"]
      # Vitest 4.1.x has known incompatibility with jsdom on Node 22 CI
      # (issue #9279). Pin to 4.0.x until upstream fix lands.
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
      - dependency-name: "@vitest/*"
        update-types: ["version-update:semver-major"]
      # TypeScript 6.0 (Mar 2026) breaks moduleResolution: classic + target default
      # → migration session required, not a passive bump
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # Vite 8 swaps esbuild → Rolldown (Rust bundler), plugin-react 6 swaps
      # Babel → Oxc. Both need vite.config.ts re-validation across 19 proxy routes.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/*"
        update-types: ["version-update:semver-major"]
      # jsdom 29 may break test setup — bump only after manual local validation
      - dependency-name: "jsdom"
        update-types: ["version-update:semver-major"]
      # lucide-react 0.x → 1.x (Apr 2026): icon API + tree-shaking changes.
      # Project uses 100+ icons; needs sweep + visual QA, not a passive bump.
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
    groups:
      # Batch minor + patch into a single PR per group
      react-ecosystem:
        patterns:
          - "react*"
          - "@types/react*"
      vite-ecosystem:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "vitest"
      maplibre:
        patterns:
          - "maplibre-gl"
          - "react-map-gl"
      typescript-tooling:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "eslint*"
    labels:
      - "dependencies"

  # Ingestor dependencies (separate schedule — backend changes less)
  - package-ecosystem: "npm"
    directory: "/ingestor"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ingestor"

  # GitHub Actions versions (also a supply-chain target — tj-actions
  # mar-2025 incident; cooldown applies here too).
  #
  # Block major bumps: Dependabot mergeó checkout v4→v6 + setup-node v4→v6
  # in PRs #6/#7 (2026-04-23) but those versions DO NOT EXIST in the GitHub
  # Actions marketplace yet (latest stable is v4). The merge silently broke
  # CI for ~1 month with "exit code 1 after 5s" until detected by user on
  # 2026-05-25. Always-on guard against the same trap recurring.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "actions/*"
        update-types: ["version-update:semver-major"]
    labels:
      - "ci"
