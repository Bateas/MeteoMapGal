<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="wave-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- 3 wind strokes — WiFi-like: shortest at top, widest at bottom, each with curled end -->
  <g fill="none" stroke="url(#wg)" stroke-linecap="round">
    <!-- Wind 1 (top, shortest) -->
    <path d="M18 16 Q30 12, 40 16 Q45 18, 43 13 Q41 9, 36 12" stroke-width="3.5"/>
    <!-- Wind 2 (middle) -->
    <path d="M14 28 Q30 22, 46 28 Q53 31, 50 24 Q47 18, 42 22" stroke-width="4"/>
    <!-- Wind 3 (bottom, widest) -->
    <path d="M10 40 Q28 33, 50 40 Q56 42, 54 36 Q51 30, 46 34" stroke-width="4.5" opacity="0.8"/>
  </g>
  <!-- Wave line — 2 undulations, schematic ocean -->
  <path d="M8 52 Q16 46, 24 52 Q32 58, 40 52 Q48 46, 56 52" fill="none" stroke="url(#wave-g)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
</svg>
