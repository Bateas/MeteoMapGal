<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#0f172a"/>
  <!-- Wind rose circle -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#334155" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="14" fill="none" stroke="#334155" stroke-width="0.8"/>
  <!-- Cardinal cross -->
  <line x1="32" y1="8" x2="32" y2="56" stroke="#475569" stroke-width="0.6"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="#475569" stroke-width="0.6"/>
  <!-- Wind rose diamond (N-S primary) -->
  <polygon points="32,10 38,32 32,54 26,32" fill="#3b82f6" opacity="0.3" stroke="#3b82f6" stroke-width="1"/>
  <!-- Wind rose diamond (E-W secondary) -->
  <polygon points="54,32 32,26 10,32 32,38" fill="#60a5fa" opacity="0.2" stroke="#60a5fa" stroke-width="0.8"/>
  <!-- N arrow accent -->
  <polygon points="32,10 28,22 32,18 36,22" fill="#3b82f6"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#60a5fa"/>
  <!-- Cardinal labels -->
  <text x="32" y="7" text-anchor="middle" font-size="5" font-weight="bold" fill="#93c5fd">N</text>
  <text x="32" y="61" text-anchor="middle" font-size="5" font-weight="bold" fill="#64748b">S</text>
  <text x="59" y="33.5" text-anchor="middle" font-size="5" font-weight="bold" fill="#64748b">E</text>
  <text x="5" y="33.5" text-anchor="middle" font-size="5" font-weight="bold" fill="#64748b">W</text>
</svg>
